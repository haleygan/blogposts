---
layout: default
---

<article class="article">
  <header class="article-header">
    <p class="eyebrow">Blog post</p>
    <h1>{{ page.title }}</h1>
    <div class="article-meta">
      <span>{{ page.date | date: "%B %-d, %Y" }}</span>
      <span>·</span>
      <span>{{ site.title }}</span>
    </div>
  </header>

  <div class="article-body">
    {{ content }}
  </div>
</article>
